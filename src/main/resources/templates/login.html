<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Bella Bites</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdf2f4 0%, #fce4ec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.15);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-box h1 {
            font-family: 'Playfair Display', serif;
            color: #d81b60;
            font-size: 28px;
            margin-bottom: 4px;
        }
        .login-box p.subtitle {
            color: #999;
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* Role tabs */
        .role-tabs {
            display: flex;
            background: #fdf2f4;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .role-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #b0134c;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-tab.active {
            background: #d81b60;
            color: #fff;
            box-shadow: 0 2px 8px rgba(216, 27, 96, 0.3);
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #f0d0da;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #d81b60; }
        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: #d81b60;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        button.submit-btn:hover { background: #b0134c; }
        .error-msg {
            background: #fdecea;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .logout-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .footer-note {
            margin-top: 22px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🍓 Bella Bites</h1>
        <p class="subtitle">Bakery Management System</p>

        <div th:if="${param.error}" class="error-msg">
            Invalid username or password
        </div>
        <div th:if="${param.roleerror}" class="error-msg">
            This account doesn't have access to the selected portal
        </div>
        <div th:if="${param.logout}" class="logout-msg">
            You have been logged out successfully
        </div>

        <!-- Role selector tabs -->
        <div class="role-tabs">
            <button type="button" class="role-tab active" id="tabAdmin" onclick="selectRole('ADMIN')">Admin</button>
            <button type="button" class="role-tab" id="tabEmployee" onclick="selectRole('EMPLOYEE')">Employee</button>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" id="loginType" name="loginType" value="ADMIN">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <p class="footer-note">Admin &amp; Employee access only</p>
    </div>

    <script>
        function selectRole(role) {
            document.getElementById('loginType').value = role;
            document.getElementById('tabAdmin').classList.toggle('active', role === 'ADMIN');
            document.getElementById('tabEmployee').classList.toggle('active', role === 'EMPLOYEE');
        }
    </script>
</body>
</html>
